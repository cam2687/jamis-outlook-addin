<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAMIS Update Completion</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>JAMIS Update Completion</h1>
      <p class="subtitle">Auto-generate maintenance completed reply</p>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Reading email...</p>
    </div>

    <form id="form" class="form hidden">
      <div class="field">
        <label for="customer">Customer</label>
        <input type="text" id="customer" />
      </div>

      <div class="field">
        <label for="siteUrl">Site URL</label>
        <input type="text" id="siteUrl" />
      </div>

      <div class="field">
        <label for="environment">Environment</label>
        <select id="environment">
          <option value="Production">Production</option>
          <option value="TEST">TEST</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="updateNumber">Update #</label>
          <input type="text" id="updateNumber" />
        </div>
        <div class="field">
          <label for="caseNumber">Case #</label>
          <input type="text" id="caseNumber" placeholder="Optional" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="build">Build</label>
          <input type="text" id="build" />
        </div>
        <div class="field">
          <label for="dbVersion">DB Version</label>
          <input type="text" id="dbVersion" />
        </div>
      </div>

      <div class="field">
        <label for="downtime">Total Downtime</label>
        <input type="text" id="downtime" placeholder="e.g. 25 minutes" />
      </div>

      <div id="error" class="error hidden"></div>

      <button type="button" id="generateBtn" class="btn-primary">
        Generate Reply All
      </button>

      <button type="button" id="reParseBtn" class="btn-secondary">
        Re-parse Email
      </button>
    </form>

    <div id="success" class="success hidden">
      <p>Reply generated! Check your Outlook compose window.</p>
      <button type="button" id="resetBtn" class="btn-secondary">Generate Another</button>
    </div>
  </div>
</body>
</html>
